# =============================================================================
# 火/烟检测节点配置（fire_smoke_node.py）
# =============================================================================
# 修改本文件后重启节点即可生效。也可在 launch 或命令行覆盖：
#   ros2 launch d435i_detection fire_smoke.launch.py \
#       weights_path:=/abs/path/best.pt confidence_threshold:=0.55
# =============================================================================

/**:
  ros__parameters:

    # ── 模型 ─────────────────────────────────────────────────────────────────
    # 训练好的火/烟 YOLOv5 权重（fire-smoke-detect 开源仓库的 best.pt）
    # 工程根目录已经复制了一份到：d435i_detection/weights/fire_smoke_best.pt
    weights_path: "/home/sunrise/rdks100_slam/ros2_ws/src/d435i_detection/weights/fire_smoke_best.pt"

    # YOLOv5 源码目录（torch.load 反序列化时需要找到自定义模块 models.* / utils.*）
    # 注意：必须是包含 models/ 和 utils/ 目录的那一层
    yolov5_src_dir: "/home/sunrise/rdks100_slam/fire-smoke-detect-yolov5/yolov5"

    # 类别名（与 fire_smoke.yaml 一致）。如果模型自带 names，会自动覆盖此值。
    class_names: ["fire", "smoke"]

    # ── 阈值 ─────────────────────────────────────────────────────────────────
    # 置信度。开源 best.pt 比 COCO 噪点稍大，先 0.45 起步；
    # 误报多 → 调到 0.55 ~ 0.65；漏报多 → 调到 0.35 ~ 0.40
    confidence_threshold: 0.45
    iou_threshold: 0.45
    max_detections: 10

    # ── 推理性能 ─────────────────────────────────────────────────────────────
    # 推理图尺寸。CPU 上 416 已经能跑到 4~8 FPS，火警这个用途足够。
    # 想更准可调到 640，CPU 上会掉到 2~3 FPS。
    infer_width: 416
    infer_height: 416

    # 推理周期。火警不需要 30fps，0.2s 一次就行（约 5 FPS）
    infer_interval_sec: 0.20

    # ── 深度测距 ─────────────────────────────────────────────────────────────
    depth_sample_count: 24
    use_depth: true

    # ── 预警去抖 + 冷却 ──────────────────────────────────────────────────────
    # 必须连续 N 个推理周期都命中才发 prealert，抑制单帧误报
    consecutive_hits: 3
    # 触发一次 prealert 后，X 秒内不再触发（避免刷屏 + 省 VLM 费用）
    prealert_cooldown_sec: 10.0

    # ── 订阅 topic ───────────────────────────────────────────────────────────
    sub_topic_rgb:   "/camera/camera/color/image_raw"
    sub_topic_depth: "/camera/camera/aligned_depth_to_color/image_raw"

    # ── 发布 topic ───────────────────────────────────────────────────────────
    pub_topic_results:   "/fire_smoke/results"
    pub_topic_annotated: "/fire_smoke/annotated_image"
    pub_topic_prealert:  "/fire_smoke/prealert"

    # 是否发布带标注图（关掉省 CPU 和带宽）
    publish_annotated: true
