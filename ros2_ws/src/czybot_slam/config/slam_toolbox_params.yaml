# slam_toolbox 在线异步建图配置
# 硬件：RDK S100 + Livox Mid-360S（通过pointcloud_to_laserscan转换为/scan）
# 与Cartographer 2D模式互为备选，启动更轻量

slam_toolbox:
  ros__parameters:

    # ─── 求解器 ───────────────────────────────────────
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ─── ROS 坐标系 ────────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # ─── 调试 ──────────────────────────────────────────
    debug_logging: false
    throttle_scans: 1              # 处理每一帧扫描（360S帧率低，全处理）
    transform_publish_period: 0.02 # 50Hz TF发布
    map_update_interval: 1.0       # 1秒更新一次地图（降低CPU负载）
    resolution: 0.05               # 5cm分辨率
    max_laser_range: 25.0          # 360S室内有效范围25m
    minimum_time_interval: 0.1     # 最小处理时间间隔

    # ─── TF 缓冲 ──────────────────────────────────────
    transform_timeout: 0.3         # TF超时：容忍STM32启动延迟
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ─── 扫描匹配条件 ─────────────────────────────────
    # 小车有里程计，阈值可适当提高减少不必要更新
    minimum_travel_distance: 0.15  # 15cm移动才更新地图
    minimum_travel_heading: 0.15   # ~8.6度旋转才更新

    # ─── 扫描缓冲 ──────────────────────────────────────
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 20.0
    scan_queue_size: 50

    # ─── 扫描匹配质量 ──────────────────────────────────
    link_match_minimum_response_fine: 0.3
    link_scan_maximum_distance: 1.0

    # ─── 回环检测 ──────────────────────────────────────
    do_loop_closing: true
    loop_search_maximum_distance: 5.0
    loop_match_minimum_chain_size: 15
    loop_match_maximum_variance_coarse: 2.0
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    # ─── 相关性搜索空间 ───────────────────────────────
    correlation_search_space_dimension: 0.8
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.05

    # ─── 回环搜索空间 ─────────────────────────────────
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ─── 匹配惩罚 ─────────────────────────────────────
    distance_variance_penalty: 0.8
    angle_variance_penalty: 1.5
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
