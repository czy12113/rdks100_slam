pointcloud_to_laserscan:
  ros__parameters:
    target_frame: "base_link"
    transform_tolerance: 0.05

    # Keep the 2D projection narrow. A wide vertical slice mixes floor,
    # furniture, door frames and wall points into one LaserScan and often
    # appears as double walls in Cartographer.
    min_height: -0.20
    max_height: 0.35

    angle_min: -3.14159265
    angle_max: 3.14159265
    angle_increment: 0.00436332
    scan_time: 0.1

    range_min: 0.1
    range_max: 15.0

    use_inf: true
    inf_epsilon: 1.0
