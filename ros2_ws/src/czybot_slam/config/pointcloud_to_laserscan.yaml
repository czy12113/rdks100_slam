pointcloud_to_laserscan:
  ros__parameters:
    # 雷达水平安装：变换到 base_link 后做水平切片和2D投影。
    target_frame: "base_link"
    transform_tolerance: 0.20

    # base_link 水平高度切片：雷达安装在 base_link 上方约 0.15 m，
    # 切片下沿要明显高出 0 才能避开地板反射；上沿覆盖到一人高的箱子/桌面。
    min_height: 0.15
    max_height: 0.90

    angle_min: -3.14159265
    angle_max: 3.14159265
    angle_increment: 0.00436332
    scan_time: 0.1

    range_min: 0.20
    range_max: 12.0

    use_inf: true
    inf_epsilon: 1.0
